  - Open Source
  - Cloudflare Workers
  - Public APIs
apis:
  - name: kanye.rest
    description: >-
      The Kanye REST API returns random Kanye West quotes. Three operations are exposed: a JSON quote endpoint at the
      root, a plain-text endpoint at /text, and a full-collection endpoint at /quotes returning all quotes as a JSON
      array. All endpoints are unauthenticated GETs with permissive CORS.
    humanURL: https://kanye.rest
    baseURL: https://api.kanye.rest
    tags:
      - Personality
      - Quotes
