aid: kanye-rest
name: kanye.rest
description: >-
  Free single-purpose REST API that returns random Kanye West quotes, dubbed "Kanye as a Service." Hosted on Cloudflare
  Workers, the API exposes a JSON endpoint, a plain-text endpoint, and a full-quotes-array endpoint. The underlying
  project is open source (MIT) under github.com/ajzbc/kanye.rest and is a popular example of a minimal "fun" public API.
url: https://kanye.rest
specificationVersion: '0.20'
